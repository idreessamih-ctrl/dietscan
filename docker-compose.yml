services:
  traefik:
    image: traefik:v3.3
    container_name: dietscan-traefik
    restart: unless-stopped
    command:
      # API / dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.le.acme.email=admin@foodlens.live"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - traefik-network

  postgres:
    image: postgres:17-alpine
    container_name: dietscan-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "max_connections=100"]
    environment:
      POSTGRES_PASSWORD: diet_secure_pw_2024
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: dietscan-valkey
    restart: unless-stopped
    command: ["valkey-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - valkey_data:/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.15
    container_name: dietscan-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: diet_meili_master_key_2024
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7700/health 2>/dev/null || curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:10.1.0
    container_name: dietscan-supertokens
    restart: unless-stopped
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://postgres:***@postgres:5432/dietscan_auth
      API_KEYS: diet_supertokens_key_2024
      SUPERTOKENS_PORT: 3567
    networks:
      - app-network
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3567/hello 2>/dev/null || curl -sf http://localhost:3567/hello || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: dietscan-api
    restart: unless-stopped
    environment:
      API_PORT: "3001"
      NODE_ENV: production
      API_DOMAIN: https://foodlens.live
      WEBSITE_DOMAIN: https://foodlens.live
      SUPERTOKENS_COOKIE_DOMAIN: foodlens.live
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: diet_secure_pw_2024
      PGDATABASE: dietscan_core
      SUPERTOKENS_URI: http://supertokens:3567
      SUPERTOKENS_API_KEY: diet_supertokens_key_2024
      VALKEY_URL: redis://valkey:6379
      JWT_SECRET: diet_jwt_secret_2024
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: diet_meili_master_key_2024
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`foodlens.live`) || Host(`www.foodlens.live`) || Host(`api.foodlens.live`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    networks:
      - app-network
      - db-network
      - traefik-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      supertokens:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  traefik-network:
    driver: bridge
  app-network:
    driver: bridge
  db-network:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  meilisearch_data:
  letsencrypt_data:
