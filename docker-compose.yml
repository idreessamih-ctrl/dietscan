services:
  postgres:
    image: postgres:17-alpine
    container_name: dietscan-postgres
    restart: unless-stopped
    ports:
      - "5438:5432"
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "max_connections=100"]
    environment:
      POSTGRES_PASSWORD: diet_secure_pw_2024
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: dietscan-valkey
    restart: unless-stopped
    ports:
      - "6389:6379"
    command: ["valkey-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - valkey_data:/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.15
    container_name: dietscan-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: diet_meili_master_key_2024
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7700/health 2>/dev/null || curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:10.1.0
    container_name: dietscan-supertokens
    restart: unless-stopped
    ports:
      - "3567:3567"
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://postgres:diet_secure_pw_2024@postgres:5432/dietscan_auth
    networks:
      - app-network
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3567/hello 2>/dev/null || curl -sf http://localhost:3567/hello || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: dietscan-api
    restart: unless-stopped
    ports:
      - "3011:3001"
    environment:
      API_PORT: "3001"
      NODE_ENV: production
      API_DOMAIN: http://109.199.106.147:3011
      WEBSITE_DOMAIN: http://109.199.106.147:3011
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: diet_secure_pw_2024
      PGDATABASE: dietscan_core
      SUPERTOKENS_URI: http://supertokens:3567
      SUPERTOKENS_API_KEY: diet_supertokens_key_2024
      VALKEY_URL: redis://valkey:6379
      JWT_SECRET: diet_jwt_secret_2024
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: diet_meili_master_key_2024
    networks:
      - app-network
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      supertokens:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  meilisearch_data:

