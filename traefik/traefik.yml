global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: :443

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true

api:
  dashboard: false
  insecure: false

ping:
  entryPoint: web

certificatesResolvers:
  le:
    acme:
      email: admin@dietscan.com
      storage: /etc/traefik/acme/acme.json
      tlsChallenge: {}
